<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Fireplace — SparkJS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; }
    canvas { display: block; }
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: #888; font-family: system-ui; font-size: 14px;
      z-index: 10; pointer-events: none;
    }
    #loading.hidden { display: none; }
  </style>
</head>
<body>
  <div id="loading">Loading fireplace…</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
        "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/2.0.0/spark.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { SparkRenderer, SplatMesh } from "@sparkjsdev/spark";

    // Scene
    const scene = new THREE.Scene();

    // Camera
    const camera = new THREE.PerspectiveCamera(
      60, window.innerWidth / window.innerHeight, 0.1, 1000
    );
    camera.position.set(0, 0.5, 3);

    // THREE.js renderer
    const renderer = new THREE.WebGLRenderer({ alpha: true });
    renderer.setClearColor(0x000000, 0);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Spark renderer (handles splat sorting + rendering)
    const spark = new SparkRenderer({ renderer });
    scene.add(spark);

    // Orbit controls — drag to rotate, scroll to zoom
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;
    controls.target.set(0, 0, 0);

    // Load the fireplace splat
    const fireplace = new SplatMesh({
      url: "https://sparkjs.dev/assets/splats/fireplace.spz",
      onLoad: () => {
        document.getElementById("loading").classList.add("hidden");
      },
    });
    scene.add(fireplace);

    // Handle resize
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Render loop
    renderer.setAnimationLoop(() => {
      controls.update();
      renderer.render(scene, camera);
    });
  </script>
</body>
</html>
